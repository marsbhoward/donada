name: Execute Draw

env:
  SCHEDULED_NETWORK: Mainnet

on:
  schedule:
    # Runs every 15 minutes. draw_script.ts self-guards using drawDates.csv —
    # it exits immediately if the scheduled draw time has not been reached yet.
    # Note: GitHub Actions cron is best-effort — runs may be delayed up to
    # several minutes during high load. The draw will execute on the first
    # run that fires after the scheduled draw time.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Manual trigger from the GitHub Actions UI (useful for testing).
    inputs:
      network:
        description: 'Network'
        required: true
        default: 'Mainnet'
        type: choice
        options:
          - Preview
          - Mainnet

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to commit and push the CSV completion marker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run draw script
        run: npx tsx "claude code/draw_script.ts"
        env:
          NETWORK: ${{ github.event.inputs.network || env.SCHEDULED_NETWORK }}
          OWNER_SEED_PHRASE: ${{ secrets.OWNER_SEED_PHRASE }}
          REACT_APP_BlockFrost_API_KEY_Preview: ${{ secrets.BLOCKFROST_API_KEY_PREVIEW }}
          REACT_APP_BlockFrost_API_KEY_Mainnet: ${{ secrets.BLOCKFROST_API_KEY_MAINNET }}
          PRIZE_LOVELACE: ${{ secrets.PRIZE_LOVELACE }}
          REACT_APP_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          REACT_APP_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          REACT_APP_EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
